name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          channels: conda-forge
          channel-priority: strict
          auto-activate-base: true

      - name: Install build tools
        shell: bash -el {0}
        run: conda install -y constructor build

      - name: Build wheel
        shell: bash -el {0}
        run: python -m build --wheel

      - name: Copy wheel into installer directory
        shell: bash -el {0}
        run: cp dist/fit_changedetector-*.whl installer/

      - name: Build installer
        shell: bash -el {0}
        run: constructor installer/

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: FIT_ChangeDetector-Windows-installer
          path: FIT_ChangeDetector-*-Windows-x86_64.exe
          if-no-files-found: error

      - name: Upload installer to release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash -el {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} FIT_ChangeDetector-*-Windows-x86_64.exe
